title: 'Bacterial Flagellar Motor-Hook Complex'
author_note: 'Based on Molstar example from molstar.org. High-fidelity recreation using entity-based chain selectors.'

scenes:
  - id: overview
    header: 'Bacterial Flagellar Motor-Hook Complex'
    key: 'overview'
    description: |
      # Bacterial Flagellar Motor-Hook Complex

      Cryo-EM structure of the bacterial flagellar motor-hook complex, revealing the intricate architecture of this remarkable molecular machine that enables bacterial motility.

      **PDB ID:** [7CGO](https://www.rcsb.org/structure/7CGO)
      **Resolution:** 3.2 Å
      **Method:** Cryo-EM
      **Reference:** Tan et al., Cell 2021 ([doi:10.1016/j.cell.2021.03.057](https://dx.doi.org/10.1016/j.cell.2021.03.057))

      The bacterial flagellum is one of nature's most sophisticated nanomachines. This structure shows the complete motor-hook complex, including:
      - **LP Ring** (cyan) - Anchors in the peptidoglycan layer (L-ring + P-ring proteins)
      - **MS Ring** (purple) - Motor/switch complex (MS-ring L1 + L2 + M-ring proteins)
      - **Hook** (gold) - Universal joint (FliE + FlgE proteins)
      - **Rod** (orange) - Transmits torque (FlgG + FlgF + FlgC + FlgB proteins)
      - **Export Apparatus** (green) - Protein secretion system (FliR + FliQ + FliP proteins)

      The structure is shown with a smooth gaussian surface representation and slowly rotates to reveal its intricate 3D architecture. Each functional component is colored uniformly to match the original Molstar example.

      **Original Molstar Example:** [View here](https://molstar.org/viewer/?snapshot-url=https%3A%2F%2Fmolstar.org%2Fdemos%2Fstates%2Fmotor-hook.molx&snapshot-url-type=molx)

    javascript: |
      // Download the 7CGO cryo-EM structure from local assets
      // Using PDBe bcif format (4.8MB) which is more compressed than RCSB version (15MB)
      const structure = builder
        .download({ url: "7cgo.bcif" })
        .parse({ format: "bcif" })
        .modelStructure({ type: "assembly" });

      // Define the 5 functional components using entity-based chain selectors

      // LP Ring (L-ring + P-ring proteins) - Stationary anchor in peptidoglycan layer
      const lp_ring = structure
        .component({
          ref: 'LP Ring',
          selector: [
            // L-ring protein (entity 15)
            {label_asym_id:"AF"},{label_asym_id:"BF"},{label_asym_id:"CF"},{label_asym_id:"DF"},{label_asym_id:"EF"},{label_asym_id:"FF"},{label_asym_id:"GF"},{label_asym_id:"HF"},{label_asym_id:"IF"},{label_asym_id:"JF"},{label_asym_id:"KF"},{label_asym_id:"LF"},{label_asym_id:"MF"},{label_asym_id:"NF"},{label_asym_id:"OF"},{label_asym_id:"PE"},{label_asym_id:"QE"},{label_asym_id:"RE"},{label_asym_id:"SE"},{label_asym_id:"TE"},{label_asym_id:"UE"},{label_asym_id:"VE"},{label_asym_id:"WE"},{label_asym_id:"XE"},{label_asym_id:"YE"},{label_asym_id:"ZE"},
            // P-ring protein (entity 16)
            {label_asym_id:"AG"},{label_asym_id:"BG"},{label_asym_id:"CG"},{label_asym_id:"DG"},{label_asym_id:"EG"},{label_asym_id:"FG"},{label_asym_id:"GG"},{label_asym_id:"HG"},{label_asym_id:"IG"},{label_asym_id:"JG"},{label_asym_id:"KG"},{label_asym_id:"LG"},{label_asym_id:"MG"},{label_asym_id:"NG"},{label_asym_id:"OG"},{label_asym_id:"PF"},{label_asym_id:"QF"},{label_asym_id:"RF"},{label_asym_id:"SF"},{label_asym_id:"TF"},{label_asym_id:"UF"},{label_asym_id:"VF"},{label_asym_id:"WF"},{label_asym_id:"XF"},{label_asym_id:"YF"},{label_asym_id:"ZF"}
          ]
        })
        .focus({})
        .representation({ type: "surface", surface_type: "gaussian" })
        .color({ color: "#009ce0" });

      // MS Ring (MS-ring L1 + L2 + M-ring proteins) - Motor/switch complex
      const ms_ring = structure
        .component({
          ref: 'MS Ring',
          selector: [
            // MS ring L2 (entity 3)
            {label_asym_id:"AA"},{label_asym_id:"BA"},{label_asym_id:"CA"},{label_asym_id:"DA"},{label_asym_id:"EA"},
            // MS ring L1 (entity 4)
            {label_asym_id:"FA"},{label_asym_id:"GA"},{label_asym_id:"HA"},{label_asym_id:"IA"},{label_asym_id:"RA"},
            // M-ring protein (entity 12)
            {label_asym_id:"AC"},{label_asym_id:"AE"},{label_asym_id:"BC"},{label_asym_id:"BE"},{label_asym_id:"CC"},{label_asym_id:"CE"},{label_asym_id:"DC"},{label_asym_id:"DE"},{label_asym_id:"EC"},{label_asym_id:"EE"},{label_asym_id:"FC"},{label_asym_id:"FE"},{label_asym_id:"GC"},{label_asym_id:"GE"},{label_asym_id:"HC"},{label_asym_id:"HD"},{label_asym_id:"HE"},{label_asym_id:"IC"},{label_asym_id:"ID"},{label_asym_id:"IE"},{label_asym_id:"JC"},{label_asym_id:"JD"},{label_asym_id:"JE"},{label_asym_id:"KC"},{label_asym_id:"KD"},{label_asym_id:"KE"},{label_asym_id:"LC"},{label_asym_id:"LD"},{label_asym_id:"LE"},{label_asym_id:"MC"},{label_asym_id:"MD"},{label_asym_id:"ME"},{label_asym_id:"NC"},{label_asym_id:"ND"},{label_asym_id:"NE"},{label_asym_id:"OC"},{label_asym_id:"OD"},{label_asym_id:"OE"},{label_asym_id:"PC"},{label_asym_id:"PD"},{label_asym_id:"QC"},{label_asym_id:"QD"},{label_asym_id:"RC"},{label_asym_id:"RD"},{label_asym_id:"SC"},{label_asym_id:"SD"},{label_asym_id:"TC"},{label_asym_id:"TD"},{label_asym_id:"UC"},{label_asym_id:"UD"},{label_asym_id:"VC"},{label_asym_id:"VD"},{label_asym_id:"WD"},{label_asym_id:"XD"},{label_asym_id:"YD"},{label_asym_id:"ZB"},{label_asym_id:"ZD"}
          ]
        })
        .representation({ type: "surface", surface_type: "gaussian" })
        .color({ color: "#7b64ff" });

      // Hook (FliE + FlgE proteins) - Universal joint
      const hook = structure
        .component({
          ref: 'Hook',
          selector: [
            // FliE (entity 7)
            {label_asym_id:"AB"},{label_asym_id:"BB"},{label_asym_id:"CB"},{label_asym_id:"DB"},{label_asym_id:"YA"},{label_asym_id:"ZA"},
            // FlgE Hook protein (entity 8)
            {label_asym_id:"AH"},{label_asym_id:"BH"},{label_asym_id:"CH"},{label_asym_id:"DH"},{label_asym_id:"EB"},{label_asym_id:"EH"},{label_asym_id:"FB"},{label_asym_id:"FH"},{label_asym_id:"GB"},{label_asym_id:"GH"},{label_asym_id:"HB"},{label_asym_id:"HH"},{label_asym_id:"IB"},{label_asym_id:"IH"},{label_asym_id:"JB"},{label_asym_id:"JH"},{label_asym_id:"KB"},{label_asym_id:"KH"},{label_asym_id:"LB"},{label_asym_id:"MB"},{label_asym_id:"NB"},{label_asym_id:"OB"},{label_asym_id:"PG"},{label_asym_id:"QG"},{label_asym_id:"RG"},{label_asym_id:"SG"},{label_asym_id:"TG"},{label_asym_id:"UG"},{label_asym_id:"VG"},{label_asym_id:"WG"},{label_asym_id:"XG"},{label_asym_id:"YG"},{label_asym_id:"ZG"}
          ]
        })
        .representation({ type: "surface", surface_type: "gaussian" })
        .color({ color: "#fcc400" });

      // Rod (FlgG + FlgF + FlgC + FlgB proteins) - Transmits torque
      const rod = structure
        .component({
          ref: 'Rod',
          selector: [
            // FlgG (entity 1)
            {label_asym_id:"A"},{label_asym_id:"B"},{label_asym_id:"C"},{label_asym_id:"D"},{label_asym_id:"E"},{label_asym_id:"F"},{label_asym_id:"G"},{label_asym_id:"H"},{label_asym_id:"I"},{label_asym_id:"J"},{label_asym_id:"K"},{label_asym_id:"L"},{label_asym_id:"M"},{label_asym_id:"N"},{label_asym_id:"O"},{label_asym_id:"P"},{label_asym_id:"Q"},{label_asym_id:"R"},{label_asym_id:"S"},{label_asym_id:"T"},{label_asym_id:"U"},{label_asym_id:"VA"},{label_asym_id:"WA"},{label_asym_id:"XA"},
            // FlgF (entity 2)
            {label_asym_id:"V"},{label_asym_id:"W"},{label_asym_id:"X"},{label_asym_id:"Y"},{label_asym_id:"Z"},
            // FlgC (entity 5)
            {label_asym_id:"JA"},{label_asym_id:"KA"},{label_asym_id:"LA"},{label_asym_id:"MA"},{label_asym_id:"QA"},{label_asym_id:"SA"},
            // FlgB (entity 6)
            {label_asym_id:"NA"},{label_asym_id:"OA"},{label_asym_id:"PA"},{label_asym_id:"TA"},{label_asym_id:"UA"}
          ]
        })
        .representation({ type: "surface", surface_type: "gaussian" })
        .color({ color: "#e27300" });

      // Export Apparatus (FliR + FliQ + FliP proteins) - Protein secretion system
      const export_apparatus = structure
        .component({
          ref: 'Export Apparatus',
          selector: [
            // FliR (entity 9)
            {label_asym_id:"PB"},
            // FliQ (entity 10)
            {label_asym_id:"QB"},{label_asym_id:"RB"},{label_asym_id:"SB"},{label_asym_id:"TB"},
            // FliP (entity 11)
            {label_asym_id:"UB"},{label_asym_id:"VB"},{label_asym_id:"WB"},{label_asym_id:"XB"},{label_asym_id:"YB"}
          ]
        })
        .representation({ type: "surface", surface_type: "gaussian" })
        .color({ color: "#68bc00" });

      // Note: Original molx has selective spin - only Rod and Export Apparatus rotate,
      // while LP Ring, MS Ring, and Hook remain stationary. Mol-view-spec currently
      // only supports scene-level animations (not per-component), so we omit the
      // animation to preserve the stationary LP Ring as a key structural feature.
      //
      // To add global spin (all components), uncomment:
      // const anim = builder.animation({
      //   custom: {
      //     molstar_trackball: {
      //       name: "spin",
      //       params: { speed: 0.05 }
      //     }
      //   }
      // });

