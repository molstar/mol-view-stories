title: 'P-450 Cytochromes Superposition'
author_note: 'Based on Molstar example from molstar.org. Superposition of 9 P-450 cytochrome structures with transformation matrices from original molx state.'

scenes:
  - id: main
    header: 'P-450 Cytochromes Superposition'
    key: 'overview'
    description: |
      # P-450 Cytochromes Superposition

      Structural superposition of 9 P-450 cytochrome structures showing structural diversity and conservation in the P-450 superfamily.

      **Structures:**
      - **2H7S** - CYP2C8 (reference, cyan)
      - **2RFC** - CYP2C9 (red)
      - **2L8M** - CYP2C19 (orange)
      - **3WRK** - CYP2D6 (yellow)
      - **2LQD** - CYP2E1 (green)
      - **3FWG** - CYP3A4 (blue)
      - **6WE6** - CYP3A5 (purple)
      - **1K2O** - CYP2A6 (magenta)
      - **6OOX** - CYP1A2 (pink)

      All structures are superposed using transformation matrices from the original Molstar example to show the conserved P-450 fold and structural variations. Ligands and cofactors (including heme groups) are shown as ball_and_stick representations.

      **Protein coloring:**
      - Structure 1 (2H7S) colored by PDBe structure quality report (validation data)
        - Green = Good quality, Yellow = Moderate issues, Red = Significant issues
      - Other structures colored by distinct solid colors for easy identification

      **Ligands:** Element-based coloring (ball_and_stick)

      **Original Molstar Example:** [View here](https://molstar.org/viewer/?snapshot-url=https%3A%2F%2Fmolstar.org%2Fdemos%2Fstates%2Fcytochromes.molx&snapshot-url-type=molx)

    javascript: |
      // Helper function to add ligands to a structure
      function addLigands(struct, refPrefix) {
        // Ligands
        struct
          .component({ ref: `${refPrefix}-ligand`, selector: "ligand" })
          .representation({ type: "ball_and_stick" })
          .color({ custom: { element_symbol: {} } });
      }

      // Structure 1: 2H7S - CYP2C8 (Reference, no transformation)
      const struct1 = builder
        .download({ url: "2h7s.bcif" })
        .parse({ format: "bcif" })
        .assemblyStructure({ assembly_id: "1" });

      struct1
        .component({ ref: 'CYP2C8', selector: "polymer" })
        .representation({ type: "cartoon" })
        .color({ color: "#4caf50" });

      addLigands(struct1, 'CYP2C8');

      // Structure 2: 2RFC - CYP2C9
      const struct2 = builder
        .download({ url: "2rfc.bcif" })
        .parse({ format: "bcif" })
        .assemblyStructure({ assembly_id: "1" })
        .transform({
          rotation: [
            0.34182254141476376, 0.07806573308799436, 0.9365164257835175,
            0.5860559591695829, -0.7967333618598289, -0.1474929017714519,
            0.7346398349985663, 0.5992674567074179, -0.31809224525770263
