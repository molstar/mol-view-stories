title: 'Nuclear Pore Complex'
author_note: 'Based on Molstar example from molstar.org'

scenes:
  - id: main
    header: 'Nuclear Pore Complex'
    key: 'overview'
    description: |
      # Nuclear Pore Complex

      Integrative/Hybrid (I/H) structure of the Nuclear Pore Complex from PDB-Dev.

      **PDB-Dev ID:** [PDBDEV_00000012](https://pdb-dev.wwpdb.org/entry.html?PDBDEV_00000012)

      **Type:** Integrative/Hybrid Structure

      The Nuclear Pore Complex (NPC) is one of the largest macromolecular assemblies in eukaryotic cells, serving as the gateway for molecular transport between the nucleus and cytoplasm. This integrative structure combines data from multiple experimental techniques to model the complete NPC architecture.

      The structure is shown with a gaussian surface representation colored by unit index using an interpolated yellow-orange-brown palette to highlight the different protein components of the complex.

      **Original Molstar Example:** [View here](https://molstar.org/viewer/?snapshot-url=https%3A%2F%2Fmolstar.org%2Fdemos%2Fstates%2Fnpc.molx&snapshot-url-type=molx)

    javascript: |
      // Load the NPC integrative structure from local assets
      // This file contains 2 models: model 0 (full structure) and model 1 (putty/coarse parts)
      const structure = builder
        .download({ url: "PDBDEV_00000012.bcif" })
        .parse({ format: "bcif" })
        .modelStructure({ model_index: 0 });

      // Show polymer components with gaussian surface and unit-index coloring
      // Interpolated yellow-orange-brown palette matching the adjacent state.json snapshot
      structure
        .component({ ref: 'NPC', selector: "polymer" })
        .representation({ type: "surface", surface_type: "gaussian", custom: {
          molstar_representation_params: { radiusOffset: 2, sizeFactor: 3, smoothness: 0.5 }
        } })
        .color({ custom: {
          molstar_color_theme_name: 'unit-index',
          molstar_color_theme_params: {
            palette: {
              name: 'colors',
              params: {
                list: { kind: 'interpolate', colors: [
                  16777189, 16775100, 16704401, 16696399, 16685353,
                  15495188, 13388802, 10040324, 6694150
                ]}
              }
            }
          }
        } });

      // TODO: Add model 1 for putty representation when putty is supported in MVS
      // Model 1 shows coarse-grained parts in orange putty representation

      const structure2 = builder
        .download({ url: "PDBDEV_00000012.bcif" })
        .parse({ format: "bcif" })
        .modelStructure({ model_index: 1 });

      structure2
        .component({ ref: 'NPC-putty', selector: "polymer" })
        .representation({ type: "putty", size_theme: 'uniform', size_factor: 2  })
        .color({ color: "#D4890A" });

    camera:
      mode: 'perspective'
      position: [355.90, 1529.56, 972.37]
      target: [59.88, 13.11, 47.25]
      up: [-0.077, -0.508, 0.858]
      fov: 45

    linger_duration_ms: 10000
    transition_duration_ms: 1500
