project:
  type: website
  output-dir: _site
  render:
    - '*.qmd'
  preview:
    port: 4200
    browser: false

website:
  title: 'MolViewStories Documentation'
  favicon: img/favicon.ico
  repo-url: https://github.com/molstar/mol-view-stories
  repo-actions: [edit, issue]
  site-url: https://molstar.org/mol-view-stories/
  sidebar:
    style: 'docked'
    search: true
    # logo: img/favicon.ico
    title: 'MolViewStories'
    tools:
      - icon: github
        href: https://github.com/molstar/mol-view-stories
        text: 'GitHub Repository'
      - icon: globe
        href: https://molstar.org/mol-view-stories/
        text: 'Live Website'
    contents:
      - text: 'Introduction'
        href: index.qmd

      - section: 'MolViewStories'
        contents:
          - text: 'Quick Start'
            href: getting-started.qmd
          - text: 'Interface Guide'
            href: webapp-interface.qmd
          - text: 'Building Stories'
            href: core-features.qmd
          - text: 'Cloud Storage & Sharing'
            href: webapp-cloud-storage.qmd
          - text: 'CLI Tool'
            href: cli.qmd
          - text: 'Cloud Storage'
            href: webapp-cloud-storage.qmd
          - text: 'Tips & Workflows'
            href: tips-shortcuts.qmd
          - text: 'CLI Tool'
            href: cli.qmd
          - section: 'Full Examples'
            contents:
              - text: 'Creating MOTM 01'
                href: example-stories/making-of-mom1.qmd
              - text: 'Creating MOTM 300'
                href: example-stories/making-of-mom300.qmd
              - text: 'Creating NPC Basket'
                href: example-stories/making-of-npc.qmd
              - text: 'Creating CYP3A4'
                href: example-stories/making-of-cyp3a4.qmd

      - section: 'MolViewSpec API'
        contents:
          - text: 'Overview'
            href: molviewspec/index.qmd
          - text: 'Selectors'
            href: molviewspec/selectors.qmd
          - text: 'Annotations'
            href: molviewspec/annotations.qmd
          - text: 'Camera Settings'
            href: molviewspec/camera.qmd
          - text: 'Primitives'
            href: molviewspec/primitives.qmd
          - text: 'Volumetric Data'
            href: molviewspec/volumes.qmd
          - text: 'Animations'
            href: molviewspec/animations.qmd
          - text: 'Examples'
            href: molviewspec/examples.qmd

      - section: 'Reference'
        contents:
          - text: 'API Reference'
            href: reference-api.qmd
          - text: 'Advanced Features'
            href: reference-advanced.qmd
          - text: 'Glossary'
            href: reference-glossary.qmd
          - text: 'FAQ'
            href: faq-troubleshooting.qmd
          - text: 'First Time Login'
            href: first-time-login.qmd
          - text: 'MVS Spec'
            href: molviewspec/mvs-spec.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap

filters:
  - zachcp/molviewspec-quarto

execute:
  freeze: auto
